<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turtle Graphics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #fafafa; display: flex; flex-direction: column; height: 100vh; }
.canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 16px; }
svg { width: 100%; height: 100%; background: #fff; border: 1px solid #ddd; }
.controls { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #f0f0f0; border-top: 1px solid #ddd; }
button { font: inherit; font-size: 14px; padding: 4px 14px; cursor: pointer; border: 1px solid #bbb; border-radius: 3px; background: #fff; }
button:hover { background: #e8e8e8; }
button:active { background: #ddd; }
label { font-size: 13px; color: #555; }
input[type=range] { width: 120px; }
.speed-val { font-size: 13px; color: #555; min-width: 2.5em; }
</style>
</head>
<body>

<div class="canvas-wrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="controls">
  <button id="playBtn">Play</button>
  <button id="resetBtn">Reset</button>
  <label>Speed</label>
  <input type="range" id="speedSlider" min="1" max="200" value="30">
  <span class="speed-val" id="speedVal">30</span>
</div>

<script>
(function () {
  'use strict';

  // --- Segment data ---
  // Each entry: { x, y, h, d, p }
  //   x, y = position BEFORE this step
  //   h    = heading BEFORE this step (degrees, 0=north, clockwise)
  //   d    = distance moved (0 for pure turns)
  //   p    = pen state (1=down, 0=up)
  // Browser computes endpoint: x2 = x + d*sin(h), y2 = y - d*cos(h)

  // Compute endpoint from turtle-centric segment
  function segEnd(s) {
    var rad = s.h * Math.PI / 180;
    return { x: s.x + s.d * Math.sin(rad), y: s.y - s.d * Math.cos(rad) };
  }

  // Sample: square + pen-up move + triangle
  var SAMPLE_SEGMENTS = (function () {
    var segs = [];
    var x = 0, y = 0, h = 0;
    var p = 1;

    function forward(dist) {
      segs.push({ x: x, y: y, h: h, d: dist, p: p });
      var rad = h * Math.PI / 180;
      x += dist * Math.sin(rad);
      y -= dist * Math.cos(rad);
    }
    function right(deg) {
      segs.push({ x: x, y: y, h: h, d: 0, p: 0 });
      h = ((h + deg) % 360 + 360) % 360;
    }

    for (var i = 0; i < 4; i++) { forward(100); right(90); }
    p = 0; forward(50); p = 1;
    for (var j = 0; j < 3; j++) { forward(80); right(120); }

    return segs;
  })();

  var segments = window.TURTLE_SEGMENTS || SAMPLE_SEGMENTS;

  // --- SVG setup ---
  var svg = document.getElementById('canvas');
  var ns = 'http://www.w3.org/2000/svg';

  // Compute bounding box
  function computeViewBox(segs) {
    if (!segs.length) return { x: -100, y: -100, w: 200, h: 200 };
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var i = 0; i < segs.length; i++) {
      var s = segs[i], e = segEnd(s);
      minX = Math.min(minX, s.x, e.x);
      minY = Math.min(minY, s.y, e.y);
      maxX = Math.max(maxX, s.x, e.x);
      maxY = Math.max(maxY, s.y, e.y);
    }
    var pad = Math.max(maxX - minX, maxY - minY) * 0.1 + 20;
    return { x: minX - pad, y: minY - pad, w: maxX - minX + 2 * pad, h: maxY - minY + 2 * pad };
  }

  // Create SVG line elements (hidden initially)
  var lines = [];
  function buildLines() {
    // Clear existing
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    lines = [];

    // Defs for turtle cursor
    var defs = document.createElementNS(ns, 'defs');
    var marker = document.createElementNS(ns, 'g');
    marker.id = 'turtle';
    // Turtle triangle: points north, 12px tall, 8px wide
    var tri = document.createElementNS(ns, 'polygon');
    tri.setAttribute('points', '0,-7 4,5 -4,5');
    tri.setAttribute('fill', 'rgba(0,160,0,0.7)');
    tri.setAttribute('stroke', '#060');
    tri.setAttribute('stroke-width', '0.5');
    marker.appendChild(tri);
    defs.appendChild(marker);
    svg.appendChild(defs);

    // Lines group
    var linesGroup = document.createElementNS(ns, 'g');
    linesGroup.id = 'lines';
    linesGroup.setAttribute('stroke', '#222');
    linesGroup.setAttribute('stroke-width', '1.5');
    linesGroup.setAttribute('stroke-linecap', 'round');
    svg.appendChild(linesGroup);

    for (var i = 0; i < segments.length; i++) {
      var s = segments[i];
      if (s.p && s.d !== 0) {
        var e = segEnd(s);
        var line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', s.x);
        line.setAttribute('y1', s.y);
        line.setAttribute('x2', e.x);
        line.setAttribute('y2', e.y);
        line.style.display = 'none';
        linesGroup.appendChild(line);
        lines.push({ el: line, idx: i });
      }
    }

    // Turtle cursor (use element)
    var cursor = document.createElementNS(ns, 'use');
    cursor.setAttribute('href', '#turtle');
    cursor.id = 'cursor';
    svg.appendChild(cursor);

    // Set viewBox
    var vb = computeViewBox(segments);
    svg.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);

    // Scale stroke width relative to viewBox
    var scale = Math.max(vb.w, vb.h) / 500;
    linesGroup.setAttribute('stroke-width', Math.max(0.5, 1.5 * scale));
    tri.setAttribute('stroke-width', Math.max(0.3, 0.5 * scale));
    // Scale turtle size
    var tscale = Math.max(0.5, scale);
    marker.setAttribute('transform', 'scale(' + tscale + ')');
  }

  // --- Animation state ---
  var playing = false;
  var segIndex = 0;       // current segment index (into segments[])
  var segProgress = 0;    // 0..1 within current segment
  var lineMap = {};       // segIndex -> line element index
  var speed = 30;         // segments per second
  var lastTime = 0;
  var animId = null;

  function buildLineMap() {
    lineMap = {};
    for (var i = 0; i < lines.length; i++) {
      lineMap[lines[i].idx] = i;
    }
  }

  // Position the turtle cursor
  function positionTurtle(x, y, heading) {
    var cursor = document.getElementById('cursor');
    if (!cursor) return;
    cursor.setAttribute('transform', 'translate(' + x + ',' + y + ') rotate(' + heading + ')');
  }

  // Show lines up to (but not including) segment segIdx, plus partial current
  function renderFrame() {
    // Show all completed lines
    for (var i = 0; i < lines.length; i++) {
      var li = lines[i];
      if (li.idx < segIndex) {
        li.el.style.display = '';
        // Reset to full segment
        var s = segments[li.idx], e = segEnd(s);
        li.el.setAttribute('x2', e.x);
        li.el.setAttribute('y2', e.y);
      } else if (li.idx === segIndex && segments[li.idx].p && segments[li.idx].d !== 0) {
        // Partial current segment
        li.el.style.display = '';
        var seg = segments[segIndex], end = segEnd(seg);
        var cx = seg.x + (end.x - seg.x) * segProgress;
        var cy = seg.y + (end.y - seg.y) * segProgress;
        li.el.setAttribute('x2', cx);
        li.el.setAttribute('y2', cy);
      } else {
        li.el.style.display = 'none';
      }
    }

    // Position turtle cursor
    if (segIndex < segments.length) {
      var seg = segments[segIndex];
      if (seg.d === 0) {
        // Pure turn — cursor at position, facing heading
        positionTurtle(seg.x, seg.y, seg.h);
      } else {
        var end = segEnd(seg);
        var tx = seg.x + (end.x - seg.x) * segProgress;
        var ty = seg.y + (end.y - seg.y) * segProgress;
        positionTurtle(tx, ty, seg.h);
      }
    } else if (segments.length > 0) {
      // Animation done — cursor at final position
      var last = segments[segments.length - 1], e = segEnd(last);
      positionTurtle(e.x, e.y, last.h);
    } else {
      positionTurtle(0, 0, 0);
    }
  }

  function segmentLength(s) {
    return Math.abs(s.d);
  }

  // Compute total path length for uniform speed
  var totalLength = 0;
  var segLengths = [];
  function computeLengths() {
    totalLength = 0;
    segLengths = [];
    for (var i = 0; i < segments.length; i++) {
      var l = segmentLength(segments[i]);
      segLengths.push(l);
      totalLength += l;
    }
  }

  function animate(timestamp) {
    if (!playing) return;
    if (!lastTime) lastTime = timestamp;

    var dt = (timestamp - lastTime) / 1000; // seconds
    lastTime = timestamp;

    if (segIndex >= segments.length) {
      playing = false;
      playBtn.textContent = 'Play';
      renderFrame();
      return;
    }

    // Advance: speed = units per second (in coordinate space)
    // Multiply speed slider value by a base rate
    var rate = speed * 5; // pixels per second
    var advance = rate * dt;

    while (advance > 0 && segIndex < segments.length) {
      // Skip zero-distance entries (turns) instantly
      if (segments[segIndex].d === 0) {
        segIndex++;
        segProgress = 0;
        continue;
      }
      var sl = segLengths[segIndex];
      var remaining = (1 - segProgress) * sl;
      if (advance >= remaining) {
        advance -= remaining;
        segIndex++;
        segProgress = 0;
      } else {
        segProgress += advance / sl;
        advance = 0;
      }
    }

    renderFrame();
    animId = requestAnimationFrame(animate);
  }

  // --- Controls ---
  var playBtn = document.getElementById('playBtn');
  var resetBtn = document.getElementById('resetBtn');
  var speedSlider = document.getElementById('speedSlider');
  var speedVal = document.getElementById('speedVal');

  playBtn.addEventListener('click', function () {
    if (segIndex >= segments.length) {
      // Reset if finished
      segIndex = 0;
      segProgress = 0;
    }
    playing = !playing;
    playBtn.textContent = playing ? 'Pause' : 'Play';
    if (playing) {
      lastTime = 0;
      animId = requestAnimationFrame(animate);
    } else if (animId) {
      cancelAnimationFrame(animId);
    }
  });

  resetBtn.addEventListener('click', function () {
    playing = false;
    playBtn.textContent = 'Play';
    if (animId) cancelAnimationFrame(animId);
    segIndex = 0;
    segProgress = 0;
    renderFrame();
  });

  speedSlider.addEventListener('input', function () {
    speed = parseInt(this.value, 10);
    speedVal.textContent = speed;
  });

  // --- Load data from server if available ---
  function loadSegments(data) {
    segments = data;
    computeLengths();
    buildLines();
    buildLineMap();
    segIndex = 0;
    segProgress = 0;
    renderFrame();
  }

  // Add new segments incrementally — no rebuild, no flash
  function loadNewSegments(data) {
    var prevCount = segments.length;
    segments = data;
    computeLengths();

    // Add SVG lines for new pen-down segments only
    var linesGroup = document.getElementById('lines');
    for (var i = prevCount; i < segments.length; i++) {
      var s = segments[i];
      if (s.p && s.d !== 0) {
        var e = segEnd(s);
        var line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', s.x);
        line.setAttribute('y1', s.y);
        line.setAttribute('x2', e.x);
        line.setAttribute('y2', e.y);
        line.style.display = 'none';
        linesGroup.appendChild(line);
        lines.push({ el: line, idx: i });
      }
    }
    buildLineMap();

    // Update viewBox to fit all segments
    var vb = computeViewBox(segments);
    svg.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);
    var scale = Math.max(vb.w, vb.h) / 500;
    linesGroup.setAttribute('stroke-width', Math.max(0.5, 1.5 * scale));

    // Stop current animation, jump to end of old segments
    if (animId) cancelAnimationFrame(animId);
    segIndex = prevCount;
    segProgress = 0;
    renderFrame();

    // Auto-play the new ones
    if (prevCount < data.length) {
      playing = true;
      playBtn.textContent = 'Pause';
      lastTime = 0;
      animId = requestAnimationFrame(animate);
    }
  }

  // Load segments — poll for changes when served from a live endpoint
  if (window.TURTLE_ENDPOINT) {
    var lastFingerprint = '';
    function fingerprint(data) {
      if (!data.length) return '0';
      var last = data[data.length - 1];
      return data.length + ',' + last.h + ',' + last.x + ',' + last.y;
    }
    function poll() {
      fetch(window.TURTLE_ENDPOINT)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var fp = fingerprint(data);
          if (fp !== lastFingerprint) {
            var first = lastFingerprint === '';
            var countChanged = data.length !== segments.length;
            lastFingerprint = fp;
            if (first || data.length < segments.length) {
              // First load or clearscreen — full rebuild
              loadSegments(data);
            } else if (countChanged) {
              loadNewSegments(data);
            } else {
              // Same count but heading changed (turn command) — update cursor
              segments = data;
              renderFrame();
            }
          }
        })
        .catch(function () {});
    }
    poll();
    setInterval(poll, 100);
  } else {
    loadSegments(segments);
  }
})();
</script>
</body>
</html>
