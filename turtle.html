<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turtle Graphics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #fafafa; display: flex; flex-direction: column; height: 100vh; }
.canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 16px; }
svg { width: 100%; height: 100%; background: #fff; border: 1px solid #ddd; }
.controls { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #f0f0f0; border-top: 1px solid #ddd; }
button { font: inherit; font-size: 14px; padding: 4px 14px; cursor: pointer; border: 1px solid #bbb; border-radius: 3px; background: #fff; }
button:hover { background: #e8e8e8; }
button:active { background: #ddd; }
label { font-size: 13px; color: #555; }
input[type=range] { width: 120px; }
.speed-val { font-size: 13px; color: #555; min-width: 2.5em; }
</style>
</head>
<body>

<div class="canvas-wrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="controls">
  <button id="playBtn">Play</button>
  <button id="resetBtn">Reset</button>
  <label>Speed</label>
  <input type="range" id="speedSlider" min="1" max="200" value="30">
  <span class="speed-val" id="speedVal">30</span>
</div>

<script>
(function () {
  'use strict';

  // --- Bytecode format ---
  // Flat JSON array: ["F",100,"R",90,"U","F",50,"D","F",80,"R",120]
  // Opcodes: F(dist) B(dist) R(deg) L(deg) U D C H(deg) M(x,y) O
  // The browser IS the turtle — it interprets bytecodes and renders SVG.

  // Opcode argument counts
  var OPARGS = { F:1, B:1, R:1, L:1, U:0, D:0, C:0, H:1, M:2, O:0 };

  // Sample bytecode: square + pen-up move + triangle
  var SAMPLE_BC = [
    "F",100,"R",90,"F",100,"R",90,"F",100,"R",90,"F",100,"R",90,
    "U","F",50,"D",
    "F",80,"R",120,"F",80,"R",120,"F",80,"R",120
  ];

  // Parse flat array into instruction objects: [{op, args, x, y, h, dist}]
  function parseBytecode(bc) {
    var instrs = [];
    var x = 0, y = 0, h = 0, pen = true;
    var i = 0;
    while (i < bc.length) {
      var op = bc[i++];
      var nargs = OPARGS[op] || 0;
      var args = [];
      for (var j = 0; j < nargs; j++) args.push(bc[i++]);

      // Record state BEFORE this instruction
      var instr = { op: op, args: args, x: x, y: y, h: h, pen: pen, dist: 0 };

      // Execute to compute next state and distance
      switch (op) {
        case 'F': {
          var d = args[0];
          var rad = h * Math.PI / 180;
          x += d * Math.sin(rad);
          y -= d * Math.cos(rad);
          instr.dist = Math.abs(d);
          break;
        }
        case 'B': {
          var d = -args[0];
          var rad = h * Math.PI / 180;
          x += d * Math.sin(rad);
          y -= d * Math.cos(rad);
          instr.dist = Math.abs(d);
          break;
        }
        case 'R': h += args[0]; break;
        case 'L': h -= args[0]; break;
        case 'U': pen = false; break;
        case 'D': pen = true; break;
        case 'C': x = 0; y = 0; h = 0; pen = true; break;
        case 'H': h = args[0]; break;
        case 'M': {
          var dx = args[0] - x, dy = args[1] - y;
          instr.dist = Math.sqrt(dx*dx + dy*dy);
          x = args[0]; y = args[1];
          break;
        }
        case 'O': {
          instr.dist = Math.sqrt(x*x + y*y);
          x = 0; y = 0; h = 0;
          break;
        }
      }
      // Record state AFTER for endpoint computation
      instr.x2 = x; instr.y2 = y; instr.h2 = h;
      instrs.push(instr);
    }
    return instrs;
  }

  // --- SVG setup ---
  var svg = document.getElementById('canvas');
  var ns = 'http://www.w3.org/2000/svg';

  // Compute bounding box from instructions
  function computeViewBox(instrs) {
    if (!instrs.length) return { x: -100, y: -100, w: 200, h: 200 };
    var minX = 0, minY = 0, maxX = 0, maxY = 0;
    for (var i = 0; i < instrs.length; i++) {
      var s = instrs[i];
      minX = Math.min(minX, s.x, s.x2);
      minY = Math.min(minY, s.y, s.y2);
      maxX = Math.max(maxX, s.x, s.x2);
      maxY = Math.max(maxY, s.y, s.y2);
    }
    var pad = Math.max(maxX - minX, maxY - minY) * 0.1 + 20;
    return { x: minX - pad, y: minY - pad, w: maxX - minX + 2*pad, h: maxY - minY + 2*pad };
  }

  // Build SVG elements from instructions
  var lines = [];
  var instrs = [];

  function buildSVG() {
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    lines = [];

    // Defs for turtle cursor
    var defs = document.createElementNS(ns, 'defs');
    var marker = document.createElementNS(ns, 'g');
    marker.id = 'turtle';
    var tri = document.createElementNS(ns, 'polygon');
    tri.setAttribute('points', '0,-7 4,5 -4,5');
    tri.setAttribute('fill', 'rgba(0,160,0,0.7)');
    tri.setAttribute('stroke', '#060');
    tri.setAttribute('stroke-width', '0.5');
    marker.appendChild(tri);
    defs.appendChild(marker);
    svg.appendChild(defs);

    // Lines group
    var linesGroup = document.createElementNS(ns, 'g');
    linesGroup.id = 'lines';
    linesGroup.setAttribute('stroke', '#222');
    linesGroup.setAttribute('stroke-width', '1.5');
    linesGroup.setAttribute('stroke-linecap', 'round');
    svg.appendChild(linesGroup);

    // Create line elements for pen-down forward/back/move instructions
    for (var i = 0; i < instrs.length; i++) {
      var s = instrs[i];
      if (s.pen && s.dist > 0) {
        var line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', s.x);
        line.setAttribute('y1', s.y);
        line.setAttribute('x2', s.x2);
        line.setAttribute('y2', s.y2);
        line.style.display = 'none';
        linesGroup.appendChild(line);
        lines.push({ el: line, idx: i });
      }
    }

    // Cursor
    var cursor = document.createElementNS(ns, 'use');
    cursor.setAttribute('href', '#turtle');
    cursor.id = 'cursor';
    svg.appendChild(cursor);

    // ViewBox
    var vb = computeViewBox(instrs);
    svg.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);
    var scale = Math.max(vb.w, vb.h) / 500;
    linesGroup.setAttribute('stroke-width', Math.max(0.5, 1.5 * scale));
    tri.setAttribute('stroke-width', '0.5');
  }

  // --- Animation ---
  var playing = false;
  var instrIndex = 0;
  var instrProgress = 0;
  var lineMap = {};
  var speed = 30;
  var lastTime = 0;
  var animId = null;

  function buildLineMap() {
    lineMap = {};
    for (var i = 0; i < lines.length; i++) lineMap[lines[i].idx] = i;
  }

  function positionTurtle(x, y, heading) {
    var cursor = document.getElementById('cursor');
    if (!cursor) return;
    // Scale cursor to constant screen size regardless of viewBox
    var vb = svg.viewBox.baseVal;
    var s = Math.max(vb.width, vb.height) / 500;
    s = Math.max(0.5, s);
    cursor.setAttribute('transform',
      'translate(' + x + ',' + y + ') scale(' + s + ') rotate(' + heading + ')');
  }

  var lastRenderedLine = -1;  // index into lines[] of last fully shown line

  function renderFrame() {
    // Show newly completed lines (incremental — no full scan)
    var targetLine = lineMap[instrIndex] !== undefined ? lineMap[instrIndex] : lines.length;
    while (lastRenderedLine + 1 < targetLine) {
      lastRenderedLine++;
      var li = lines[lastRenderedLine];
      li.el.style.display = '';
      var s = instrs[li.idx];
      li.el.setAttribute('x2', s.x2);
      li.el.setAttribute('y2', s.y2);
    }

    // Handle current partial line
    var curLineIdx = lineMap[instrIndex];
    if (curLineIdx !== undefined && instrs[instrIndex].pen && instrs[instrIndex].dist > 0) {
      var li = lines[curLineIdx];
      li.el.style.display = '';
      var s = instrs[instrIndex];
      li.el.setAttribute('x2', s.x + (s.x2 - s.x) * instrProgress);
      li.el.setAttribute('y2', s.y + (s.y2 - s.y) * instrProgress);
    }

    // Position cursor
    if (instrIndex < instrs.length) {
      var s = instrs[instrIndex];
      if (s.dist === 0) {
        positionTurtle(s.x, s.y, s.h2);
      } else {
        var tx = s.x + (s.x2 - s.x) * instrProgress;
        var ty = s.y + (s.y2 - s.y) * instrProgress;
        positionTurtle(tx, ty, s.h);
      }
    } else if (instrs.length > 0) {
      var last = instrs[instrs.length - 1];
      positionTurtle(last.x2, last.y2, last.h2);
    } else {
      positionTurtle(0, 0, 0);
    }
  }

  function animate(timestamp) {
    if (!playing) return;
    if (!lastTime) lastTime = timestamp;
    var dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    if (instrIndex >= instrs.length) {
      playing = false;
      playBtn.textContent = 'Play';
      renderFrame();
      return;
    }

    var rate = speed * 5;
    var advance = rate * dt;

    while (advance > 0 && instrIndex < instrs.length) {
      if (instrs[instrIndex].dist === 0) {
        instrIndex++;
        instrProgress = 0;
        continue;
      }
      var sl = instrs[instrIndex].dist;
      var remaining = (1 - instrProgress) * sl;
      if (advance >= remaining) {
        advance -= remaining;
        instrIndex++;
        instrProgress = 0;
      } else {
        instrProgress += advance / sl;
        advance = 0;
      }
    }

    renderFrame();
    animId = requestAnimationFrame(animate);
  }

  // --- Controls ---
  var playBtn = document.getElementById('playBtn');
  var resetBtn = document.getElementById('resetBtn');
  var speedSlider = document.getElementById('speedSlider');
  var speedVal = document.getElementById('speedVal');

  playBtn.addEventListener('click', function () {
    if (instrIndex >= instrs.length) {
      instrIndex = 0;
      instrProgress = 0;
    }
    playing = !playing;
    playBtn.textContent = playing ? 'Pause' : 'Play';
    if (playing) {
      lastTime = 0;
      animId = requestAnimationFrame(animate);
    } else if (animId) {
      cancelAnimationFrame(animId);
    }
  });

  resetBtn.addEventListener('click', function () {
    playing = false;
    playBtn.textContent = 'Play';
    if (animId) cancelAnimationFrame(animId);
    for (var i = 0; i < lines.length; i++) lines[i].el.style.display = 'none';
    lastRenderedLine = -1;
    instrIndex = 0;
    instrProgress = 0;
    renderFrame();
  });

  speedSlider.addEventListener('input', function () {
    speed = parseInt(this.value, 10);
    speedVal.textContent = speed;
  });

  // --- Load bytecode ---
  function loadBytecode(bc) {
    instrs = parseBytecode(bc);
    buildSVG();
    buildLineMap();
    lastRenderedLine = -1;
    instrIndex = 0;
    instrProgress = 0;
    renderFrame();
  }

  function loadNewBytecode(bc) {
    var prevCount = instrs.length;
    instrs = parseBytecode(bc);

    // Add SVG lines for new pen-down instructions only
    var linesGroup = document.getElementById('lines');
    for (var i = prevCount; i < instrs.length; i++) {
      var s = instrs[i];
      if (s.pen && s.dist > 0) {
        var line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', s.x);
        line.setAttribute('y1', s.y);
        line.setAttribute('x2', s.x2);
        line.setAttribute('y2', s.y2);
        line.style.display = 'none';
        linesGroup.appendChild(line);
        lines.push({ el: line, idx: i });
      }
    }
    buildLineMap();

    // Update viewBox
    var vb = computeViewBox(instrs);
    svg.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);
    var scale = Math.max(vb.w, vb.h) / 500;
    linesGroup.setAttribute('stroke-width', Math.max(0.5, 1.5 * scale));

    if (animId) cancelAnimationFrame(animId);
    instrIndex = prevCount;
    instrProgress = 0;
    renderFrame();

    if (prevCount < instrs.length) {
      playing = true;
      playBtn.textContent = 'Pause';
      lastTime = 0;
      animId = requestAnimationFrame(animate);
    }
  }

  // --- Polling (live REPL) or static load ---
  if (window.TURTLE_ENDPOINT) {
    var lastLen = 0;
    function poll() {
      fetch(window.TURTLE_ENDPOINT)
        .then(function (r) { return r.json(); })
        .then(function (bc) {
          if (bc.length !== lastLen) {
            if (bc.length < lastLen || lastLen === 0) {
              lastLen = bc.length;
              loadBytecode(bc);
            } else {
              lastLen = bc.length;
              loadNewBytecode(bc);
            }
          }
        })
        .catch(function () {});
    }
    poll();
    setInterval(poll, 100);
  } else {
    loadBytecode(window.TURTLE_BC || SAMPLE_BC);
  }
})();
</script>
</body>
</html>
