name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: make test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: make
      - name: C specs
        run: make test-c
      - name: x-lang specs
        run: make test-x
        env:
          PARALLEL: "1"

  # Memory-safety advisory: mirrors the local pre-push gate's RUN_ASAN=1 mode.
  # REPORT-ONLY until the tracked baseline finding (eq?/match under-read in
  # object dispatch) is fixed. The step swallows the exit code on purpose:
  # job-level continue-on-error still reports a FAILING CHECK on the PR merge
  # box, which reads as a blocking gate. Red surfaces as a warning annotation
  # and in the log; make it a plain `run: make test-asan` once the baseline
  # is clean.
  asan:
    name: make test-asan (advisory)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run suites under AddressSanitizer (report-only)
        run: |
          if make test-asan; then
            echo "ASan clean — promote this job to a hard gate (see comment above)"
          else
            echo "::warning title=test-asan advisory red::tracked baseline finding (eq?/match under-read); see job log"
          fi
        env:
          PARALLEL: "1"
