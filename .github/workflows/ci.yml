name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: make test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: make
      # The contract gates -- exactly `make gates`, the same single
      # definition `make test` runs first.  A hand-listed subset here once
      # let check-pin's first Linux run happen in the release job.
      - name: Contract gates
        run: make gates
      - name: C specs
        run: make test-c
      - name: x-lang specs
        run: make test-x
        env:
          PARALLEL: "1"
      # Doctest ratchet (#16): every (example ...) in the doc registry is an
      # executable contract; a stale example is a red build, not quiet rot.
      - name: Doctests
        run: make doctest
      # Examples ratchet: every file under examples/ runs under its documented
      # dialect (batch mode), output-pinned where portable.  The first code a
      # newcomer runs was previously the only code with no gate -- and its
      # first-ever run caught or/cat.x broken by the #36 opt-in re-cut.
      - name: Examples
        run: make check-examples

  # Memory-safety gate: both suites under AddressSanitizer. HARD gate since
  # the baseline reached zero (2026-07-13; was 112 findings): a red run here
  # is a real memory-safety regression -- the class that is silently wrong
  # on 64-bit and segfaults on 32-bit/Pi. See test-asan in the Makefile for
  # the pinned ASAN_OPTIONS rationale.
  asan:
    name: make test-asan
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run suites under AddressSanitizer
        run: make test-asan
        env:
          PARALLEL: "1"
